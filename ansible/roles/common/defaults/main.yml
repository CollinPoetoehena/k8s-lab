---
# defaults file for roles/common

# System packages to install
common_packages:
  - curl
  - wget
  - vim
  - git
  - htop
  - net-tools

# SSH configuration
common_ssh_port: 22
common_ssh_permit_root_login: "no"
common_ssh_password_authentication: "no"

# Firewall configuration
common_firewall_enabled: true
common_allowed_ssh_sources: ["10.0.0.0/8"]
# TODO: is this the correct setup for firewall, what to do here?

# Time zone
common_timezone: "UTC"

# Swap configuration (disabled for Kubernetes)
common_disable_swap: true

# etcd configuration
etcd_data_dir: "/var/lib/etcd"

# API server configuration
api_server_advertise_address: "{{ ansible_default_ipv4.address }}"
api_server_extra_args:
  enable-admission-plugins: "NodeRestriction,PodSecurityPolicy"
  audit-log-path: "/var/log/kubernetes/audit.log"
  audit-log-maxage: "30"