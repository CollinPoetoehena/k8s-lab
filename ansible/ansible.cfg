# Ansible Configuration Docs: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html
# This file specifies the configuration for Ansible

[defaults]
# ============================================================================
# SSH Host Key Verification: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#host-key-checking
# ============================================================================
# Disable host key checking to allow Ansible to auto-accept SSH host keys without prompting. 
# This prevents playbook failures when connecting to new hosts but reduces security by not verifying host identity.
# Use with caution in production environments (in this case it is safe since we are only connecting to our own servers).
host_key_checking = false

# ============================================================================
# Roles Configuration: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#default-roles-path
# ============================================================================
# Specifies the directory path where Ansible will search for roles.
# Using relative path 'roles' means it looks in ./roles from where ansible is executed (typically the ansible/ directory).
roles_path = roles

# ============================================================================
# Logging: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#default-log-path
# ============================================================================
# Enable Ansible playbook execution logging to the specified file.
# Logs include task execution, results, errors, and warnings.
# File will be created relative to the directory where ansible-playbook runs.
log_path = ansible.log

# ============================================================================
# Facts Gathering & Caching: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#default-gathering
# ============================================================================
# 'smart' gathering only collects facts if they are not already cached or
# if the cache has expired. This significantly speeds up playbook runs by
# avoiding redundant fact gathering on repeated executions.
gathering = smart

# Store gathered facts in JSON files for persistence across playbook runs.
# This avoids re-gathering facts from hosts unless the cache expires.
# https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#cache-plugin
fact_caching = jsonfile
# Directory where JSON fact cache files will be stored.
# Each host gets its own JSON file in this directory.
# https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#cache-plugin-connection
fact_caching_connection = .facts
# Cache expiration time in seconds (1200s = 20 minutes).
# After this timeout, facts will be re-gathered from the target host.
# https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#cache-plugin-connection
fact_caching_timeout = 1200

# ============================================================================
# Python Interpreter Detection: https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html#interpreter-python
# ============================================================================
# Automatically detect the Python interpreter on remote hosts without displaying warnings. 
# 'auto_silent' discovers Python 3 or Python 2 interpreters but suppresses the discovery warnings that would otherwise clutter logs.
interpreter_python = auto_silent

# ============================================================================
# Host Group Variables
# ============================================================================
[all_servers:vars]
# Set SSH as the connection method for all hosts in the 'all_servers' group.
# This is the default and most common connection type for remote Linux hosts.
ansible_connection=ssh

# ============================================================================
# SSH Connection Settings: https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/ssh_connection.html
# ============================================================================
[ssh_connection]
# Number of SSH connection retry attempts before failing.
# Helps handle transient network issues or temporary host unavailability.
retries=3

# Enable SSH pipelining to reduce the number of SSH operations required.
# Executes multiple Ansible tasks over a single SSH connection without writing temporary files to the remote host. 
# Significantly improves performance but requires 'requiretty' to be disabled in the sudoers file on target hosts.
pipelining = true

# SSH multiplexing options to speed up connections:
# - ControlMaster=auto: Enables connection sharing/reuse
# - ControlPersist=600s: Keeps the master connection open for 10 minutes
# - ControlPath: Socket file location for the master connection
# Result: Subsequent connections reuse the existing SSH session, reducing authentication 
# overhead and significantly improving execution speed.
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ControlPath=~/.ansible/cp/ansible-ssh-%r@%h:%p

# SSH password prompt identifier for private key authentication.
# Required when using SSH key-based authentication (id_rsa).
# This setting became necessary after disabling paramiko as the SSH backend (once enabled because of a bug: https://github.com/ansible/ansible/issues/16894).
# Tells Ansible what prompt to expect when establishing SSH connections.
sshpass_prompt = id_rsa

[persistent_connection]
# ============================================================================
# Persistent Connection Setting: https://docs.ansible.com/projects/ansible/latest/collections/ansible/netcommon/persistent_connection.html
# ============================================================================
# These settings apply to network device connections (e.g., network_cli, netconf)
# and help prevent intermittent connection errors such as:
# fatal: [<server>]: UNREACHABLE! => {"changed": false, "msg": "No existing session", "unreachable": true}

# Maximum time (in seconds) to wait when establishing a persistent connection.
# Increased from default (30s) to handle slow network or busy hosts.
connect_timeout = 60

# Maximum time (in seconds) to wait for a command to complete on a persistent
# connection. Prevents timeouts for long-running commands or slow responses.
command_timeout = 60